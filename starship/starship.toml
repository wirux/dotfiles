# Crampack Preset for Starship (v1.0.1; Nerd Font Version)
# Requires a Nerd Font (preferably with "Propo" variant) to be installed

"$schema" = "https://starship.rs/config-schema.json"

# Available palettes:
# - mellow
# - lush
# - fervor
# - blaze
palette = "lush"

format = "\\[$directory$git_branch$git_status\\]$character"
right_format = "\\[$status$cmd_duration$python$nodejs$rust$golang$java$ruby$lua$c$swift$zig$docker_context$time\\]"
add_newline = false

[directory]
truncation_symbol = "’ü╝ "
truncation_length = 2
truncate_to_repo = true
style = "fg:frost"
format = "[$path]($style)"

[git_branch]
symbol = "’Éś"
style = "fg:lime"
format = " | [[$symbol $branch](fg:lime)]($style)"

[git_status]
format = "$all_status$ahead_behind"
conflicted = " [ŅĄŹ $count](fg:ember)"
ahead = " [’üó $count](fg:lime)"
behind = " [’üŻ $count](fg:lime)"
diverged = " [’üó $ahead_count ’üŻ $behind_count](fg:lime)"
untracked = " [¾░×ŗ $count](fg:frost)"
stashed = " [¾░Æ▓ $count](fg:surge)"
modified = " [¾░Å½ $count](fg:spark)"
staged = " [¾░▒Æ $count](fg:lime)"
renamed = " [¾░üĢ $count](fg:lime)"
deleted = " [¾░ŹĄ $count](fg:cinder)"

[character]
disabled = false
success_symbol = "[\\$](fg:lime)"
error_symbol = "[\\$](fg:ember)"
vimcmd_symbol = "[\\$](fg:lime)"
vimcmd_replace_one_symbol = "[\\$](fg:iris)"
vimcmd_replace_symbol = "[\\$](fg:iris)"
vimcmd_visual_symbol = "[\\$](fg:spark)"

# Right-side modules

[status]
disabled = false
symbol = "Ō£ś"
format = "[$symbol $status](fg:ember) |"

[cmd_duration]
min_time = 500
format = " [¾▒Ä½ $duration](fg:surf1) |"
show_milliseconds = false

[python]
symbol = "¾░īĀ"
format = " [$symbol $version](fg:spark) |"
version_format = "${raw}"

[nodejs]
symbol = "¾░ÄÖ"
format = " [$symbol $version](fg:lime) |"
version_format = "${raw}"

[rust]
symbol = "Ņ×©"
format = " [$symbol $version](fg:ember) |"
version_format = "${raw}"

[golang]
symbol = "Ņś¦"
format = " [$symbol $version](fg:pulse) |"
version_format = "${raw}"

[java]
symbol = "Ņē¢"
format = " [$symbol $version](fg:torch) |"
version_format = "${raw}"

[ruby]
symbol = "Ņ×æ"
format = " [$symbol $version](fg:cinder) |"
version_format = "${raw}"

[lua]
symbol = "¾░ó▒"
format = " [$symbol $version](fg:frost) |"
version_format = "${raw}"

[c]
symbol = "Ņś×"
format = " [$symbol $version](fg:surge) |"
version_format = "${raw}"

[swift]
symbol = "¾░øź"
format = " [$symbol $version](fg:torch) |"
version_format = "${raw}"

[zig]
symbol = "ŅÜ®"
format = " [$symbol $version](fg:spark) |"
version_format = "${raw}"

[docker_context]
symbol = "¾░Ī©"
format = " [$symbol $context](fg:pulse) |"

[time]
disabled = false
time_format = "%H:%M:%S"
format = " [¾░źö $time](fg:surf0)"

